name: Lens Collection Pipeline
# Project Lens — 4x daily collection
# Runs at: 08:00, 12:00, 16:00, 20:00 UTC
# Collects from 20 public sources
# Matches 46 indicators across 7 domains
# Ethics: public data only (LR-014(E))

on:
  schedule:
    - cron: '0 8 * * *'    # Morning UTC
    - cron: '0 12 * * *'   # Midday UTC
    - cron: '0 16 * * *'   # Afternoon UTC
    - cron: '0 20 * * *'   # Evening UTC
  workflow_dispatch:        # Manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            feedparser==6.0.12 \
            requests \
            supabase \
            python-dotenv

      - name: Run collection
        run: python code/fetch_text.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_ACTIONS: "true"
