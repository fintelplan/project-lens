name: Lens Deep Report

on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC daily — after 04:28 morning cron completes
  workflow_dispatch:         # manual trigger anytime

jobs:
  deep-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          pip install anthropic supabase python-dotenv requests reportlab
      - name: Generate 10-page deep intelligence report
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python code/lens_deep_report.py
          echo "Deep report complete"
