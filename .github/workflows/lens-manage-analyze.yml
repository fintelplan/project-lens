name: Lens Manager + Analyze

on:
  schedule:
    # Manager runs 2 min before analyze
    # Analyze cron: 13:30 17:30 21:30 04:30 UTC
    # Manager cron: 13:28 17:28 21:28 04:28 UTC
    - cron: '28 13 * * *'
    - cron: '28 17 * * *'
    - cron: '28 21 * * *'
    - cron: '28 4  * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if budget exhausted (LENS_FORCE=1)'
        required: false
        default: 'false'

jobs:
  manage-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv groq supabase

      - name: Run AI 5 Manager (pre-flight)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MANAGER_API_KEY: ${{ secrets.GROQ_MANAGER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LENS_FORCE: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
        run: |
          python code/lens_manager.py
          echo "Manager passed — proceeding to analyze"

      - name: Run 4-Lens Analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        run: |
          python code/analyze_lens_multi.py
