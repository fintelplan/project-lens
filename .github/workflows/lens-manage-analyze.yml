name: Lens Manager + Analyze
on:
  schedule:
    - cron: '28 13 * * *'
    - cron: '28 17 * * *'
    - cron: '28 21 * * *'
    - cron: '28 4  * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if budget exhausted (LENS_FORCE=1)'
        required: false
        default: 'false'
      dry_run:
        description: 'Dry run — pre-flight only, no lenses fire (LENS_DRY_RUN=1)'
        required: false
        default: 'false'

jobs:
  manage-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv groq supabase google-genai cerebras-cloud-sdk httpx mistralai openai

      - name: Run Lens Orchestrator (pre-flight + sequential analysis)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MANAGER_API_KEY: ${{ secrets.GROQ_MANAGER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          LENS_FORCE: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
          LENS_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: |
          python code/lens_orchestrator.py
          echo "System 1 complete — proceeding to System 2"

      - name: Run System 2 Orchestrator (injection + coordination + emotion + adversary + legitimacy + mission analyst)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_S2_API_KEY: ${{ secrets.GROQ_S2_API_KEY }}
          GROQ_MANAGER_API_KEY: ${{ secrets.GROQ_MANAGER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GROQ_S2E_API_KEY: ${{ secrets.GROQ_S2E_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python code/lens_s2_orchestrator.py
          echo "System 2 complete"
      - name: Run System 3 Orchestrator (pattern intelligence + true history + long-term research)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_S2_API_KEY: ${{ secrets.GROQ_S2_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python code/lens_s3_orchestrator.py
          echo "System 3 complete"
