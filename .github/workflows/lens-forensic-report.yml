name: Lens Forensic Report

on:
  schedule:
    # Daily at 02:00 UTC = 09:00 Thai
    # Runs AFTER overnight orchestrator cycle (01:00 UTC) so MA/S2/S3 evidence is fresh.
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode (no Anthropic API call, no Telegram send)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Only one forensic report should run at a time
concurrency:
  group: lens-forensic-report
  cancel-in-progress: false

jobs:
  forensic-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Forensic Report
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python code/lens_forensic_report.py --dry-run
          else
            python code/lens_forensic_report.py
          fi
