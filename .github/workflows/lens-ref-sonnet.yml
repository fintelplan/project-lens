name: Lens Ref Export (Sonnet)

on:
  schedule:
    - cron: '58 3  * * *'   # after 03:28 sonnet cron
    - cron: '58 15 * * *'   # after 15:28 sonnet cron
  workflow_dispatch:

jobs:
  ref-export-sonnet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install supabase python-dotenv requests openpyxl tzdata
      - name: Export refs (Sonnet)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python code/lens_ref_system.py --mode sonnet
