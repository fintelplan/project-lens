name: Lens Analysis Pipeline
# Project Lens — 4x daily 4-lens parallel analysis
# Runs 30 min after collection (LR-040(T): sacred gap for fresh articles)
# 13:30, 17:30, 21:30, 04:30 UTC (Washington D.C. EDT + 30min)
# 4 independent lenses in parallel:
#   Lens 1: Foundation (qwen/qwen3-32b via Groq) — PHI-002 + Debt Trap
#   Lens 2: Physical Reality (gemini-2.5-flash)
#   Lens 3: Causal Chain (qwen-3-235b via Cerebras)
#   Lens 4: Sovereignty Check (Llama-4-Maverick via SambaNova)
# LR-042(T): SLA >= 3/4 lenses complete per run
# Session: LENS-005
on:
  schedule:
    - cron: '30 13 * * *'  # 30 min after morning collect
    - cron: '30 17 * * *'  # 30 min after midday collect
    - cron: '30 21 * * *'  # 30 min after afternoon collect
    - cron: '30 4  * * *'  # 30 min after midnight collect
  workflow_dispatch:        # Manual trigger
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            groq \
            google-genai \
            cerebras-cloud-sdk \
            httpx \
            supabase \
            python-dotenv

      - name: Run 4-lens parallel analysis
        run: python code/analyze_lens_multi.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GITHUB_ACTIONS: "true"
